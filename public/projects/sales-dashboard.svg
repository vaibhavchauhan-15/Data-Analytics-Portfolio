<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" role="img" aria-label="Sales and operations Power BI dashboard">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0D0D14"/>
      <stop offset="1" stop-color="#0A0A16"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="area" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6366F1" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#6366F1" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <g stroke="#6366F1" stroke-opacity="0.06">
    <path d="M0 150H1600M0 300H1600M0 450H1600M0 600H1600M0 750H1600"/>
    <path d="M200 0V900M400 0V900M600 0V900M800 0V900M1000 0V900M1200 0V900M1400 0V900"/>
  </g>
  <!-- header -->
  <rect x="80" y="70" width="14" height="14" rx="3" fill="#F59E0B"/>
  <text x="108" y="83" font-family="monospace" font-size="22" fill="#8B8BA8">POWER BI · SALES &amp; OPS</text>
  <text x="80" y="140" font-family="DM Sans, sans-serif" font-weight="700" font-size="46" fill="#F0F0FF">Revenue Overview</text>
  <!-- KPI tiles -->
  <g>
    <rect x="80" y="190" width="320" height="120" rx="14" fill="#131320" stroke="#2A2A3E"/>
    <text x="104" y="232" font-family="monospace" font-size="20" fill="#8B8BA8">TOTAL REVENUE</text>
    <text x="104" y="284" font-family="DM Sans" font-weight="800" font-size="42" fill="#10B981">₹4.2Cr</text>
    <rect x="420" y="190" width="320" height="120" rx="14" fill="#131320" stroke="#2A2A3E"/>
    <text x="444" y="232" font-family="monospace" font-size="20" fill="#8B8BA8">MoM GROWTH</text>
    <text x="444" y="284" font-family="DM Sans" font-weight="800" font-size="42" fill="#818CF8">+18.4%</text>
    <rect x="760" y="190" width="320" height="120" rx="14" fill="#131320" stroke="#2A2A3E"/>
    <text x="784" y="232" font-family="monospace" font-size="20" fill="#8B8BA8">TOP CATEGORY</text>
    <text x="784" y="284" font-family="DM Sans" font-weight="800" font-size="42" fill="#06B6D4">22%</text>
  </g>
  <!-- bar chart -->
  <g transform="translate(80 360)">
    <rect x="-0" y="-0" width="1000" height="460" rx="16" fill="#0D0D14" stroke="#1E1E2E"/>
    <text x="32" y="48" font-family="DM Sans" font-weight="600" font-size="26" fill="#F0F0FF">Monthly Revenue by Region</text>
    <g transform="translate(60 90)">
      <rect x="0" y="190" width="70" height="150" rx="6" fill="url(#bar)"/>
      <rect x="110" y="120" width="70" height="220" rx="6" fill="url(#bar)"/>
      <rect x="220" y="160" width="70" height="180" rx="6" fill="url(#bar)"/>
      <rect x="330" y="60" width="70" height="280" rx="6" fill="url(#bar)"/>
      <rect x="440" y="140" width="70" height="200" rx="6" fill="url(#bar)"/>
      <rect x="550" y="30" width="70" height="310" rx="6" fill="url(#bar)"/>
      <rect x="660" y="100" width="70" height="240" rx="6" fill="url(#bar)"/>
      <rect x="770" y="70" width="70" height="270" rx="6" fill="url(#bar)"/>
    </g>
  </g>
  <!-- line / area card -->
  <g transform="translate(1120 360)">
    <rect width="400" height="460" rx="16" fill="#0D0D14" stroke="#1E1E2E"/>
    <text x="28" y="48" font-family="DM Sans" font-weight="600" font-size="24" fill="#F0F0FF">Trend</text>
    <path d="M28 360 L88 300 L148 320 L208 230 L268 250 L328 150 L372 180 L372 410 L28 410 Z" fill="url(#area)"/>
    <path d="M28 360 L88 300 L148 320 L208 230 L268 250 L328 150 L372 180" fill="none" stroke="#818CF8" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="328" cy="150" r="8" fill="#06B6D4"/>
  </g>
</svg>
