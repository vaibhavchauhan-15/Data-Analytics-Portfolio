<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" role="img" aria-label="KPI reporting automation pipeline">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0D0D14"/>
      <stop offset="1" stop-color="#0A0A16"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="8" refY="4" orient="auto">
      <path d="M0 0 L8 4 L0 8 Z" fill="#818CF8"/>
    </marker>
  </defs>
  <rect width="1600" height="900" fill="url(#bg4)"/>
  <g stroke="#6366F1" stroke-opacity="0.06">
    <path d="M0 150H1600M0 300H1600M0 450H1600M0 600H1600M0 750H1600"/>
    <path d="M200 0V900M400 0V900M600 0V900M800 0V900M1000 0V900M1200 0V900M1400 0V900"/>
  </g>
  <rect x="80" y="70" width="14" height="14" rx="3" fill="#6366F1"/>
  <text x="108" y="83" font-family="monospace" font-size="22" fill="#8B8BA8">SQL · AUTOMATION · REPORTING</text>
  <text x="80" y="140" font-family="DM Sans, sans-serif" font-weight="700" font-size="46" fill="#F0F0FF">KPI Reporting Automation</text>

  <!-- pipeline stages -->
  <g font-family="DM Sans, sans-serif">
    <g transform="translate(80 280)">
      <rect width="300" height="170" rx="16" fill="#131320" stroke="#2A2A3E"/>
      <text x="28" y="56" font-family="monospace" font-size="18" fill="#8B8BA8">SOURCE</text>
      <text x="28" y="106" font-weight="700" font-size="30" fill="#F0F0FF">MySQL</text>
      <text x="28" y="142" font-family="monospace" font-size="16" fill="#6C6C8C">raw tables</text>
    </g>
    <line x1="390" y1="365" x2="470" y2="365" stroke="#818CF8" stroke-width="5" marker-end="url(#arrow)"/>
    <g transform="translate(480 280)">
      <rect width="300" height="170" rx="16" fill="#131320" stroke="#2A2A3E"/>
      <text x="28" y="56" font-family="monospace" font-size="18" fill="#8B8BA8">TRANSFORM</text>
      <text x="28" y="106" font-weight="700" font-size="26" fill="#818CF8">CTEs · Windows</text>
      <text x="28" y="142" font-family="monospace" font-size="16" fill="#6C6C8C">optimized queries</text>
    </g>
    <line x1="790" y1="365" x2="870" y2="365" stroke="#818CF8" stroke-width="5" marker-end="url(#arrow)"/>
    <g transform="translate(880 280)">
      <rect width="300" height="170" rx="16" fill="#131320" stroke="#2A2A3E"/>
      <text x="28" y="56" font-family="monospace" font-size="18" fill="#8B8BA8">SERVE</text>
      <text x="28" y="106" font-weight="700" font-size="30" fill="#F2C811">Power BI</text>
      <text x="28" y="142" font-family="monospace" font-size="16" fill="#6C6C8C">KPI dashboards</text>
    </g>
  </g>

  <!-- result metric -->
  <g transform="translate(80 520)">
    <rect width="1100" height="300" rx="16" fill="#0D0D14" stroke="#1E1E2E"/>
    <text x="40" y="70" font-family="DM Sans" font-weight="600" font-size="26" fill="#F0F0FF">Refresh time — before vs after</text>
    <!-- before bar -->
    <text x="40" y="135" font-family="monospace" font-size="20" fill="#8B8BA8">BEFORE</text>
    <rect x="220" y="115" width="760" height="34" rx="8" fill="#EF4444" fill-opacity="0.7"/>
    <text x="990" y="140" font-family="monospace" font-size="22" fill="#EF4444">3+ min</text>
    <!-- after bar -->
    <text x="40" y="210" font-family="monospace" font-size="20" fill="#8B8BA8">AFTER</text>
    <rect x="220" y="190" width="450" height="34" rx="8" fill="#10B981" fill-opacity="0.8"/>
    <text x="690" y="215" font-family="monospace" font-size="22" fill="#10B981">&lt; 2 min</text>
    <text x="40" y="272" font-family="DM Sans" font-weight="800" font-size="28" fill="#06B6D4">~40% faster refresh</text>
  </g>
  <g transform="translate(1220 520)">
    <rect width="300" height="300" rx="16" fill="#131320" stroke="#2A2A3E"/>
    <text x="28" y="60" font-family="monospace" font-size="18" fill="#8B8BA8">CADENCE</text>
    <text x="28" y="130" font-family="DM Sans" font-weight="800" font-size="56" fill="#818CF8">Weekly</text>
    <text x="28" y="180" font-family="monospace" font-size="18" fill="#6C6C8C">automated reports</text>
    <text x="28" y="250" font-family="DM Sans" font-weight="800" font-size="40" fill="#10B981">3 teams</text>
  </g>
</svg>
